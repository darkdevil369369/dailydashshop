<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Your Download Library — Daily Dash Shop</title>
<meta name="description" content="Unlimited-pass members: download any template, as many times as you like, for a full year.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://dailydashshop.com/members.html"><meta name="theme-color" content="#101014">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=260717a"></head>
<body>
<div id="site-header" data-active="Credits"></div>
<section class="page-hero"><div class="wrap"><span class="eyebrow">Members</span><h1>Your download library</h1>
  <p>Enter the email on your 1-Year Unlimited Pass to download any template — unlimited, all year.</p></div></section>
<section class="section"><div class="wrap">
  <div style="max-width:520px;margin:0 auto 26px;display:flex;gap:10px;flex-wrap:wrap">
    <input id="memEmail" type="email" inputmode="email" placeholder="you@email.com" autocomplete="email"
      style="flex:1;min-width:220px;padding:13px 15px;border-radius:11px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.04);color:inherit;font-size:1rem">
    <button id="memGo" class="btn btn-accent">Open my library</button>
  </div>
  <div id="memMsg" style="text-align:center;min-height:22px;margin-bottom:18px"></div>
  <div id="memGrid" class="grid-cards"></div>
</div></section>
<div id="site-footer"></div>
<script src="/assets/data.js?v=260717a"></script>
<script src="/assets/main.js?v=260717a"></script>
<script>
(function(){
  var base = window.DDS_PAY || "";
  var $=function(s){return document.querySelector(s);};
  var email=$("#memEmail"), go=$("#memGo"), msg=$("#memMsg"), grid=$("#memGrid");
  var q=new URLSearchParams(location.search); if(q.get("email")) email.value=q.get("email");
  function valid(v){return /^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(v);}
  function pidOf(p){ try{ var l=(window.DDS.buyLinks||{})[p.id]||""; return new URL(l,location.origin).searchParams.get("pid")||""; }catch(_){return "";} }
  function show(t,ok){ msg.textContent=t; msg.style.color=ok?"#7CF0A6":"#ff9a8a"; }
  function render(){
    var em=email.value.trim();
    grid.innerHTML=(window.DDS.products||[]).map(function(p){
      var pid=pidOf(p); if(!pid) return "";
      return '<div class="f-card" style="text-align:center"><img src="'+(p.image||"")+'" alt="'+p.name+'" style="width:100%;border-radius:12px;margin-bottom:12px">'
        +'<div style="font-family:Sora;font-weight:700;margin-bottom:10px">'+p.name+'</div>'
        +'<button class="btn btn-primary md" data-pid="'+pid+'" style="width:100%">⬇ Download</button></div>';
    }).join("");
    grid.querySelectorAll("[data-pid]").forEach(function(b){
      b.addEventListener("click",async function(){
        var old=b.textContent; b.disabled=true; b.textContent="Preparing…";
        try{
          var r=await fetch(base+"/member-download?email="+encodeURIComponent(em)+"&pid="+encodeURIComponent(b.dataset.pid),{cache:"no-store"});
          var d=await r.json();
          if(d&&d.url){ window.open(d.url,"_blank","noopener"); } else { show((d&&d.error)||"Could not prepare that file.",false); }
        }catch(_){ show("Something went wrong — please try again.",false); }
        b.disabled=false; b.textContent=old;
      });
    });
  }
  async function load(){
    var em=email.value.trim();
    if(!valid(em)){ show("Please enter a valid email.",false); return; }
    if(!base){ show("Checkout is not available right now.",false); return; }
    go.disabled=true; var og=go.textContent; go.textContent="Checking…";
    try{
      var r=await fetch(base+"/wallet-balance?email="+encodeURIComponent(em),{cache:"no-store"});
      var d=await r.json();
      if(d && d.unlimited){ show("Pass active — download anything below.",true); render(); }
      else { show("No active unlimited pass found for this email. Get one on the Credits page.",false); grid.innerHTML=""; }
    }catch(_){ show("Something went wrong — please try again.",false); }
    go.disabled=false; go.textContent=og;
  }
  go.addEventListener("click",load);
  email.addEventListener("keydown",function(e){ if(e.key==="Enter") load(); });
  if(q.get("email")) load();
})();
</script>
</body></html>
